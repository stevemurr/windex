# newsyslog rotation for windex logs (macOS-native; no daemon needed).
# Install: sudo cp deploy/newsyslog-windex.conf /etc/newsyslog.d/windex.conf
# logfilename                          [owner:group] mode count size(KB) when flags
/Users/murr/.windex/logs/serve.log                   644  5     10240    *    J
/Users/murr/.windex/logs/*.log                       644  3     20480    *    J
/Users/murr/.windex/watchdog.log                     644  3     5120     *    J
