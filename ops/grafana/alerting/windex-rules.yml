# windex alert rules for the Grafana on the services box (192.168.1.237),
# Grafana-managed + file-provisioned.
#
# HOW TO USE (two options):
#   A) File provisioning — copy this file into that Grafana's
#      provisioning/alerting/ dir and restart/reload it. FIRST replace every
#      `REPLACE_WITH_PROMETHEUS_DS_UID` below with the uid of their Prometheus
#      datasource (find it: Grafana > Connections > Data sources > Prometheus,
#      the uid is in the URL, or `GET /api/datasources` -> the prometheus row's
#      "uid"). The `__expr__` datasource is Grafana's built-in server-side
#      expression engine — leave those as-is.
#   B) UI import — Alerting > Alert rules > New/Import, recreate each rule with
#      the same query + threshold; pick the Prometheus datasource from the
#      dropdown (no uid editing needed).
#
# No notification channel exists on this box (no SMTP / webhook), so rules route
# to Grafana's default contact point and fire IN-UI only (the Alerting bell / the
# Alert rules list). The "windex ops" dashboard also surfaces them: the "Active
# alerts" panel lists whatever is firing/pending, filtered to app=windex (the
# label every rule below carries). Wire a contact point + notification policy
# when a channel exists.
#
# Each rule is a Prometheus instant query (refId A) feeding a threshold
# expression (refId C) that decides firing; `for:` is the sustain window. Every
# rule carries `labels.app: windex` so the dashboard's Active-alerts panel can
# scope to windex, plus a `severity` (critical | warning).
#
# noDataState rationale: the liveness/outage rules use NoData (a scrape that
# stops IS a signal worth surfacing). The rate/quality rules use OK, because
# "no traffic" or "eval hasn't run yet" is not a fault and must not page.
apiVersion: 1

groups:
  - orgId: 1
    name: windex-fleet
    folder: windex
    interval: 1m
    rules:
      # The 2026-07-17 incident detector. A 25-min gateway outage silently
      # stalled the whole indexing pipeline for ~36h because nothing watched
      # throughput-vs-backlog. This rule is the tripwire so that can't recur:
      # embed throughput flatlined to zero WHILE a real backlog is waiting.
      - uid: windex-embeds-stalled
        title: EmbedsStalled
        condition: C
        for: 15m
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              # 1 iff embedded throughput is exactly zero over 15m AND >1000 docs
              # sit deduped-but-unembedded; 0 otherwise. Product of two boolean
              # aggregations (both label-less, so they join on the empty set).
              expr: '(sum(rate(windex_documents{status="embedded"}[15m])) == bool 0) * (sum(windex_documents{status="deduped"}) > bool 1000)'
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
        noDataState: NoData
        execErrState: Error
        labels:
          app: windex
          severity: critical
        annotations:
          summary: "Embedding pipeline has stalled with a backlog waiting"
          description: >-
            Embed throughput has been zero for 15m while >1000 docs are deduped
            but unembedded. This is the 2026-07-17 failure mode: a 25-min
            gateway outage silently stalled indexing for ~36h because no alert
            watched throughput against backlog. Check the embed loops
            (windex_loop_up), the embedding gateway (windex_gateway_up), and
            embed-<source> log staleness on the windex ops dashboard.

      # Any per-source ingest/embed loop process is down.
      - uid: windex-loop-down
        title: LoopDown
        condition: C
        for: 10m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              # Keeps the {source} label so the firing instance names the loop.
              expr: windex_loop_up
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [1]
        noDataState: NoData
        execErrState: Error
        labels:
          app: windex
          severity: warning
        annotations:
          summary: "A windex ingest/embed loop is down ({{ $labels.source }})"
          description: >-
            windex_loop_up == 0 for 10m. The named source's loop process is not
            running; its backlog will grow until it is restarted.

      # The embedding gateway (upstream model endpoint) is unreachable.
      - uid: windex-gateway-down
        title: GatewayDown
        condition: C
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              expr: windex_gateway_up
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [1]
        noDataState: NoData
        execErrState: Error
        labels:
          app: windex
          severity: critical
        annotations:
          summary: "Embedding gateway is down"
          description: >-
            windex_gateway_up == 0 for 5m. The user-supplied embedding endpoint
            is unreachable; embedding will stall (see EmbedsStalled) until it
            recovers. This was the trigger of the 2026-07-17 incident.

      # Postgres (metadata + watermarks + dedup ledgers) is unreachable.
      - uid: windex-db-down
        title: DbDown
        condition: C
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              expr: windex_db_up
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [1]
        noDataState: NoData
        execErrState: Error
        labels:
          app: windex
          severity: critical
        annotations:
          summary: "Postgres is down"
          description: >-
            windex_db_up == 0 for 5m. Metadata, state watermarks and dedup
            ledgers are unreachable; every job that writes state will fail or
            wedge. Often a transient host<->container port-forward drop under
            Apple's container CLI.

      # Qdrant (vector store) is unreachable — dense search + upserts fail.
      - uid: windex-qdrant-down
        title: QdrantDown
        condition: C
        for: 5m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              expr: windex_qdrant_up
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [1]
        noDataState: NoData
        execErrState: Error
        labels:
          app: windex
          severity: critical
        annotations:
          summary: "Qdrant is down"
          description: >-
            windex_qdrant_up == 0 for 5m. The vector store is unreachable: dense
            search returns nothing (or errors) and embedding upserts fail. Check
            the qdrant container on the windex host.

      # Query-embed circuit breaker latched open: hybrid search is degrading to
      # lexical for every query (the query-embed leg keeps timing out / refusing).
      # Distinct from GatewayDown — a bare TCP connect can still succeed while the
      # embed call itself times out under GPU contention.
      - uid: windex-query-breaker-open
        title: QueryBreakerOpen
        condition: C
        for: 10m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              expr: windex_query_breaker_state{state="open"}
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
        noDataState: OK
        execErrState: Error
        labels:
          app: windex
          severity: warning
        annotations:
          summary: "Query-embed circuit breaker is open"
          description: >-
            windex_query_breaker_state{state="open"} == 1 for 10m. The
            query-embedding leg is failing, so hybrid search is falling back to
            lexical (BM25) for live queries. Dense results are unavailable until
            the embedding endpoint recovers and the breaker half-opens. See the
            Search row (degraded share, query-embed failures) on the dashboard.

      # API is returning server errors (5xx) at a meaningful rate. Gated on a
      # minimum request rate so a single stray 500 in a quiet period can't fire.
      - uid: windex-api-high-error-rate
        title: ApiHighErrorRate
        condition: C
        for: 10m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              # 1 iff 5xx share > 5% AND overall request rate > 0.1 rps (the gate
              # keeps a lone 500 in a quiet window from tripping it). clamp_min
              # avoids a 0/0 when there is no traffic at all.
              expr: '(sum(rate(windex_http_requests_total{code=~"5.."}[10m])) / clamp_min(sum(rate(windex_http_requests_total[10m])), 1e-9) > bool 0.05) * (sum(rate(windex_http_requests_total[10m])) > bool 0.1)'
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
        noDataState: OK
        execErrState: Error
        labels:
          app: windex
          severity: warning
        annotations:
          summary: "API 5xx error rate is elevated"
          description: >-
            Over 5% of HTTP responses have been 5xx for 10m (at >0.1 rps). Check
            the API internals row (HTTP error rate by handler) and windex serve's
            log; a dependency outage (DbDown / QdrantDown) usually shows up here too.

      # Search itself is erroring (not merely degrading to lexical). result="error"
      # means run_search raised, not that hybrid fell back — that is result="degraded".
      - uid: windex-search-error-rate
        title: SearchErrorRate
        condition: C
        for: 10m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              expr: '(sum(rate(windex_search_requests_total{result="error"}[10m])) / clamp_min(sum(rate(windex_search_requests_total[10m])), 1e-9) > bool 0.05) * (sum(rate(windex_search_requests_total[10m])) > bool 0.01)'
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
        noDataState: OK
        execErrState: Error
        labels:
          app: windex
          severity: warning
        annotations:
          summary: "Search error rate is elevated"
          description: >-
            Over 5% of searches errored (result="error", i.e. run_search raised —
            not the benign degraded-to-lexical fallback) for 10m. Check the Search
            row and the API log; QdrantDown is a common root cause.

      # Relevance regression: the nightly `windex eval` NDCG on the always-on
      # known-item leg dropped below baseline. Catches a bad model swap / index
      # corruption / ranking regression that liveness alerts can't see.
      - uid: windex-search-quality-regression
        title: SearchQualityRegression
        condition: C
        for: 30m
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: REPLACE_WITH_PROMETHEUS_DS_UID
            model:
              refId: A
              expr: windex_search_quality_ndcg{leg="known_item"}
              instant: true
              range: false
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [0.8]
        noDataState: OK
        execErrState: Error
        labels:
          app: windex
          severity: warning
        annotations:
          summary: "Search quality (NDCG, known-item leg) has regressed"
          description: >-
            windex_search_quality_ndcg{leg="known_item"} < 0.8 for 30m (baseline
            ~0.93). A relevance regression — suspect a model swap, index
            corruption, or a ranking change. Re-run `windex eval` and check the
            Search quality row. Tune the 0.8 threshold to the observed baseline.
