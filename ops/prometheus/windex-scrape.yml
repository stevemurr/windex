# windex scrape job — paste this into the scrape_configs: list of the Prometheus
# on the Spark (192.168.1.237) and reload it (`curl -X POST
# http://localhost:9090/-/reload`, or SIGHUP, if --web.enable-lifecycle is set).
#
# The exporter is GET /metrics on the windex API (`windex serve`), which now runs
# on the Spark in a rootless podman container publishing :8100 — the SAME box as
# this Prometheus, so localhost:8100 works too. (Historically this ran on a Mac at
# 192.168.1.231; that target is dead — do not restore it.)
- job_name: windex
  # 30s, deliberately slow: /metrics computes gauges by aggregating multi-million-
  # row Postgres tables (windex_documents, windex_repos). The exporter caches the
  # exposition ~10s, but a tight scrape still risks piling DB load onto the live
  # indexing pipeline. 30s is plenty for the liveness/throughput alerts.
  scrape_interval: 30s
  scrape_timeout: 15s
  metrics_path: /metrics
  static_configs:
    # The Spark, co-located with Prometheus (localhost:8100 also works).
    - targets: ["192.168.1.237:8100"]
